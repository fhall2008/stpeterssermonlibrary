name: Fetch Farsi Sermon Feed

on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Farsi RSS feed
        run: |
          curl -s "https://anchor.fm/s/113390a58/podcast/rss" \
               -H "User-Agent: Mozilla/5.0" \
               -o feed-fa.xml

      - name: Parse Farsi RSS to JSON
        run: python3 parse_feed_fa.py

      - name: Commit feed-fa.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-fa.json
          git diff --staged --quiet || git commit -m "chore: update Farsi sermon feed [skip ci]"
          git push
