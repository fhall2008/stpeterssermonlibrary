name: Fetch Sermon Feed

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # allows manual trigger from GitHub Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch RSS and save as JSON
        run: |
          curl -s "https://anchor.fm/s/c1de3e94/podcast/rss" \
               -H "User-Agent: Mozilla/5.0" \
               -o feed.xml
          python3 - << 'PYEOF'
import xml.etree.ElementTree as ET
import json, re

NS = {'itunes': 'http://www.itunes.com/dtds/podcast-1.0.dtd'}

tree = ET.parse('feed.xml')
root = tree.getroot()
channel = root.find('channel')

items = []
for idx, item in enumerate(channel.findall('item')):
    def gt(tag):
        el = item.find(tag)
        return (el.text or '').strip() if el is not None else ''
    def gi(tag):
        el = item.find('itunes:' + tag, NS)
        return (el.text or '').strip() if el is not None else ''

    raw_title = gt('title')
    pipe_parts = raw_title.split('|')
    title = pipe_parts[0].strip()
    title_series = pipe_parts[-1].strip() if len(pipe_parts) > 1 else ''

    enc = item.find('enclosure')
    audio_url = enc.get('url', '') if enc is not None else ''

    items.append({
        'id': idx,
        'title': title,
        'titleSeries': title_series,
        'desc': re.sub(r'<[^>]+>', '', gi('summary') or gt('description')).strip(),
        'pubDate': gt('pubDate'),
        'audioUrl': audio_url,
        'link': gt('link'),
        'duration': gi('duration'),
        'speaker': gi('author'),
    })

with open('feed.json', 'w') as f:
    json.dump({'items': items, 'updated': __import__('datetime').datetime.utcnow().isoformat() + 'Z'}, f)
print(f'Saved {len(items)} items to feed.json')
PYEOF

      - name: Commit feed.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.json
          git diff --staged --quiet || git commit -m "chore: update sermon feed [skip ci]"
          git push
