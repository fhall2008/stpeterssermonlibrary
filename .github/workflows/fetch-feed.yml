name: Fetch Sermon Feed

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch RSS feed
        run: |
          curl -s "https://anchor.fm/s/c1de3e94/podcast/rss" \
               -H "User-Agent: Mozilla/5.0" \
               -o feed.xml

      - name: Parse RSS and search YouTube
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python3 parse_feed.py

      - name: Write config.js
        run: |
          echo "window.YT_API_KEY = '${{ secrets.YOUTUBE_API_KEY }}';" > config.js

      - name: Commit feed.json and config.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.json config.js
          git diff --staged --quiet || git commit -m "chore: update sermon feed [skip ci]"
          git push
